<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Plnr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card glass-card overflow-hidden">
            <div class="row g-0">
              <div class="col-lg-6 d-none d-lg-flex hero-panel p-5 align-items-center">
                <div>
                  <h2 class="fw-bold">Welcome back.</h2>
                  <p class="mb-0 text-secondary">Sign in to continue managing your tasks, deadlines, and priorities.</p>
                </div>
              </div>
              <div class="col-lg-6 p-4 p-md-5">
                <div class="brand-badge mb-3">P</div>
                <h1 class="fw-bold mb-2">Login to Plnr</h1>
                <p class="text-secondary">Access your planner dashboard.</p>

                <div id="loginError" class="alert alert-danger d-none"></div>

                <form id="loginForm" class="vstack gap-3">
                  <div>
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                  </div>
                  <div>
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                  </div>
                  <button class="btn btn-primary btn-lg">Login</button>
                </form>

                <p class="mt-3 mb-0">No account yet? <a href="register.html">Register</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "dashboard.html";

    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      clearError(loginError);

      const email = document.getElementById("loginEmail").value.trim().toLowerCase();
      const password = document.getElementById("loginPassword").value;
      const remember = document.getElementById("rememberMe").checked;

      if (!validateEmail(email)) return showError(loginError, "Please enter a valid email address.");

      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) return showError(loginError, "Invalid email or password.");

      setSession({ name: user.name, email: user.email }, remember);
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
