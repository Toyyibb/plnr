<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plnr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body-tertiary">
    <div class="container py-2">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
        <span class="brand-mark">P</span> Plnr
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-moon-stars"></i> Theme
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm border-0 sticky-lg-top top-100">
          <div class="card-body p-4">
            <h1 class="h4 fw-bold mb-1">Plan smarter.</h1>
            <p class="text-secondary mb-4">Organize tasks, priorities, and deadlines in one clean dashboard.</p>

            <form id="taskForm" class="vstack gap-3">
              <div>
                <label class="form-label">Task title</label>
                <input type="text" id="title" class="form-control" placeholder="e.g. Finish report" required>
              </div>
              <div>
                <label class="form-label">Notes</label>
                <textarea id="notes" class="form-control" rows="3" placeholder="Add details..."></textarea>
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label">Due date</label>
                  <input type="date" id="dueDate" class="form-control">
                </div>
                <div class="col-6">
                  <label class="form-label">Priority</label>
                  <select id="priority" class="form-select">
                    <option>Low</option>
                    <option selected>Medium</option>
                    <option>High</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="form-label">Category</label>
                <input type="text" id="category" class="form-control" placeholder="Work, Personal, Fitness">
              </div>
              <div>
                <label class="form-label">Subtasks</label>
                <div id="subtaskList" class="vstack gap-2"></div>
                <button type="button" id="addSubtask" class="btn btn-sm btn-outline-primary mt-2">
                  <i class="bi bi-plus-lg"></i> Add subtask
                </button>
              </div>
              <div class="d-grid">
                <button class="btn btn-primary btn-lg" type="submit" id="submitBtn">Add task</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body p-4">
            <div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center">
              <div>
                <h2 class="h5 fw-bold mb-1">Task board</h2>
                <p class="text-secondary mb-0">Track tasks, filter by status, and edit anytime.</p>
              </div>
              <div class="btn-group" role="group">
                <button class="btn btn-outline-secondary active filter-btn" data-filter="all">All</button>
                <button class="btn btn-outline-secondary filter-btn" data-filter="active">Active</button>
                <button class="btn btn-outline-secondary filter-btn" data-filter="completed">Completed</button>
              </div>
            </div>
          </div>
        </div>

        <div id="taskStats" class="row g-3 mb-4"></div>
        <div id="taskList" class="vstack gap-3"></div>
      </div>
    </div>
  </main>

  <template id="taskTemplate">
    <div class="card task-card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="d-flex gap-3 align-items-start">
          <div class="form-check mt-1">
            <input class="form-check-input task-toggle" type="checkbox">
          </div>
          <div class="flex-grow-1">
            <div class="d-flex flex-column flex-md-row justify-content-between gap-2">
              <div>
                <h3 class="h5 task-title mb-1"></h3>
                <div class="d-flex flex-wrap gap-2 mb-2 task-badges"></div>
              </div>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-secondary edit-btn"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-outline-danger delete-btn"><i class="bi bi-trash"></i></button>
              </div>
            </div>
            <p class="text-secondary mb-3 task-notes"></p>
            <div class="task-subtasks mb-2"></div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
