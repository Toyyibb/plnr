<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | Plnr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
    <div class="container py-2">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
        <span class="brand-badge" style="width:36px;height:36px;">P</span> Plnr
      </a>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <span id="userGreeting" class="text-secondary d-none d-md-inline"></span>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card glass-card sticky-lg-top" style="top: 90px;">
          <div class="card-body p-4">
            <h2 class="h4 fw-bold mb-1">Welcome, <span id="userName"></span></h2>
            <p class="text-secondary">Manage your tasks from one clean dashboard.</p>

            <form id="taskForm" class="vstack gap-3">
              <div>
                <label class="form-label">Task title</label>
                <input type="text" id="title" class="form-control" required>
              </div>
              <div>
                <label class="form-label">Notes</label>
                <textarea id="notes" class="form-control" rows="3"></textarea>
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label">Due date</label>
                  <input type="date" id="dueDate" class="form-control">
                </div>
                <div class="col-6">
                  <label class="form-label">Priority</label>
                  <select id="priority" class="form-select">
                    <option>Low</option>
                    <option selected>Medium</option>
                    <option>High</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="form-label">Category</label>
                <input type="text" id="category" class="form-control">
              </div>
              <div>
                <label class="form-label">Subtasks</label>
                <div id="subtaskList" class="vstack gap-2"></div>
                <button type="button" id="addSubtask" class="btn btn-sm btn-outline-primary mt-2">
                  <i class="bi bi-plus-lg"></i> Add subtask
                </button>
              </div>
              <button class="btn btn-primary btn-lg" id="submitBtn">Add task</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card glass-card mb-4">
          <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center">
            <div>
              <h2 class="h5 fw-bold mb-1">Task board</h2>
              <p class="text-secondary mb-0">CRUD, filters, due dates, categories, priorities, and subtasks.</p>
            </div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary active filter-btn" data-filter="all">All</button>
              <button class="btn btn-outline-secondary filter-btn" data-filter="active">Active</button>
              <button class="btn btn-outline-secondary filter-btn" data-filter="completed">Completed</button>
            </div>
          </div>
        </div>

        <div id="taskStats" class="row g-3 mb-4"></div>
        <div id="taskList" class="vstack gap-3"></div>
      </div>
    </div>
  </main>

  <template id="taskTemplate">
    <div class="card task-card">
      <div class="card-body p-4">
        <div class="d-flex gap-3 align-items-start">
          <input class="form-check-input task-toggle mt-1" type="checkbox">
          <div class="flex-grow-1">
            <div class="d-flex flex-column flex-md-row justify-content-between gap-2">
              <div>
                <h3 class="h5 task-title mb-1"></h3>
                <div class="task-badges d-flex flex-wrap gap-2 mb-2"></div>
              </div>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-secondary edit-btn"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-outline-danger delete-btn"><i class="bi bi-trash"></i></button>
              </div>
            </div>
            <p class="text-secondary mb-3 task-notes"></p>
            <div class="task-subtasks"></div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="auth.js"></script>
  <script src="planner.js"></script>
</body>
</html>
